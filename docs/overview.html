<!DOCTYPE html>
<html>
<head>

<title>Turnier Übersicht</title>

<script src="https://alcdn.msauth.net/browser/2.37.0/js/msal-browser.min.js"></script>
<script src="js/auth.js"></script>
<script src="js/graph.js"></script>
<script src="js/overview.js"></script>

<style>
body{
  background:#000;
  color:white;
  font-family:Arial;
  margin:0;
  padding:0;
}

h1{
  text-align:center;
  color:red;
  margin:10px;
}

/* 📺 BOARD GRID */
#boards{
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
  gap:10px;
  padding:10px;
}

/* 📦 BOARD KACHEL */
.board{
  background:#111;
  padding:10px;
  border:2px solid red;
  border-radius:10px;
}

.title{
  font-weight:bold;
  margin-bottom:5px;
}

/* LIVE */
.live{
  color:#00ff00;
}

/* NEXT */
.next{
  color:#ffaa00;
  font-size:14px;
}

/* Gruppen kompakt */
#groups{
  padding:10px;
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(150px,1fr));
  gap:10px;
}

.group{
  background:#111;
  padding:8px;
  border:1px solid #333;
  border-radius:6px;
  font-size:14px;
}

</style>

</head>

<body>

<h1>🎯 Turnier Übersicht</h1>

<div id="boards"></div>

<h2 style="text-align:center">Gruppen</h2>
<div id="groups"></div>

</body>
</html>
