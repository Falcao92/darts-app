<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Turnier Übersicht</title>

<!-- ✅ SCRIPT (WICHTIG!) -->
<script src="https://alcdn.msauth.net/browser/2.37.0/js/msal-browser.min.js"></script>
<script src="js/auth.js"></script>
<script src="js/graph.js"></script>
<script src="js/overview.js"></script>

<style>
body{
  background:#000;
  color:white;
  font-family:Arial;
  margin:0;
}

h1{
  text-align:center;
  color:red;
  margin:10px;
}

h2{
  text-align:center;
  margin-top:10px;
}

/* =========================
   📺 BOARDS
========================= */
#boards{
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap:10px;
  padding:10px;
}

.board{
  background:#111;
  border:2px solid red;
  border-radius:10px;
  padding:10px;
}

/* =========================
   🧩 GROUP TABLES
========================= */
#groups{
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(280px,1fr));
  gap:10px;
  padding:10px;
}

.group{
  background:#111;
  padding:10px;
  border:1px solid #333;
  border-radius:6px;
}

/* Tabelle */
table{
  width:100%;
  border-collapse:collapse;
  font-size:13px;
}

th, td{
  padding:4px;
  text-align:center;
  border-bottom:1px solid #333;
}

th{
  color:#aaa;
}

/* 🥇 Platz 1 */
tr:nth-child(2){
  color:#00ff00;
  font-weight:bold;
}

/* 🥈 Platz 2 */
tr:nth-child(3){
  color:#ffaa00;
}

/* =========================
   🏆 BRACKET
========================= */
#bracket{
  display:flex;
  justify-content:center;
  align-items:flex-start;
  gap:40px;
  padding:20px;
}

.round{
  display:flex;
  flex-direction:column;
  gap:20px;
}

.match{
  background:#111;
  padding:10px;
  border-radius:6px;
  border:1px solid #333;
  width:160px;
  position:relative;
}

/* Verbindungslinien */
.match::after{
  content:"";
  position:absolute;
  right:-20px;
  top:50%;
  width:20px;
  height:2px;
  background:#555;
}

/* letzte Runde ohne Linie */
.round:last-child .match::after{
  display:none;
}

/* Gewinner */
.winner{
  color:#00ff00;
  font-weight:bold;
}

</style>

</head>

<body>

<h1>🎯 Turnier Übersicht</h1>

<!-- 📺 BOARDS -->
<div id="boards"></div>

<!-- 🧩 GRUPPEN -->
<h2>🧩 Gruppentabelle</h2>
<div id="groups"></div>

<!-- 🏆 BRACKET -->
<h2>🏆 Turnierbaum</h2>
<div id="bracket"></div>

</body>
</html>
