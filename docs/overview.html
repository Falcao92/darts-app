<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Turnier Übersicht</title>

<script src="https://alcdn.msauth.net/browser/2.37.0/js/msal-browser.min.js"></script>
<script src="js/auth.js"></script>
<script src="js/graph.js"></script>
<script src="js/overview.js"></script>

<style>
body{
  background:#000;
  color:white;
  font-family:Arial;
  margin:0;
}

h1{
  text-align:center;
  color:red;
  margin:10px;
}

h2{
  text-align:center;
}

/* =========================
   📺 BOARDS
========================= */
#boards{
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap:10px;
  padding:10px;
}

.board{
  background:#111;
  border:2px solid red;
  border-radius:10px;
  padding:10px;
}

.title{
  font-size:18px;
  font-weight:bold;
  margin-bottom:5px;
}

.live{
  color:#00ff00;
  font-size:16px;
}

.next{
  margin-top:8px;
  color:#ffaa00;
  font-size:14px;
}

/* =========================
   🧩 GRUPPEN TABLE
========================= */

#groups{
  padding:10px;
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(300px,1fr));
  gap:10px;
}

.group{
  background:#111;
  padding:10px;
  border:1px solid #333;
  border-radius:6px;
}

/* ✅ TABLE STYLE */
table{
  width:100%;
  border-collapse:collapse;
  margin-top:5px;
  font-size:13px;
}

th{
  color:#aaa;
  border-bottom:1px solid #444;
  padding:4px;
}

td{
  border-bottom:1px solid #222;
  padding:4px;
  text-align:center;
}

/* ✅ Platz 1 Highlight */
tr:first-child td{
  color:#00ff00;
  font-weight:bold;
}

/* kompakt */
.small{
  font-size:12px;
  color:#888;
}

</style>

</head>

<body>

<h1>🎯 Turnier Übersicht</h1>

<!-- 📺 BOARDS -->
<div id="boards"></div>

<h2>🧩 Gruppenphase</h2>

<!-- 🧩 TABELLEN -->
<div id="groups"></div>

</body>
</html>
