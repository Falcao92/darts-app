<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Turnier Übersicht</title>

<script src="https://alcdn.msauth.net/browser/2.37.0/js/msal-browser.min.js"></script>
js/auth.js
js/graph.jsscript>
js/overview.jsscript>

<style>
body{
  background:#000;
  color:white;
  font-family:Arial;
  margin:0;
}

h1{
  text-align:center;
  color:red;
  margin:10px;
}

#boards{
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap:12px;
  padding:10px;
}

.board{
  background:#111;
  border:2px solid red;
  border-radius:10px;
  padding:10px;
}

.title{
  font-size:18px;
  font-weight:bold;
}

.live{
  color:#00ff00;
}

.next{
  margin-top:8px;
  color:#ffaa00;
}

#groups{
  padding:10px;
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(150px,1fr));
  gap:10px;
}

.group{
  background:#111;
  padding:8px;
  border:1px solid #333;
  border-radius:6px;
}
</style>

</head>

<body>

<h1>🎯 Turnier Übersicht</h1>

<div id="boards"></div>

<h2 style="text-align:center;">Gruppen</h2>
<div id="groups"></div>

</body>
</html>
