<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Turnier Übersicht</title>

<script src="https://alcdn.msauth.net/browser/2.37.0/js/msal-browser.min.js"></script>
<script src="js/auth.js"></script>
<script src="js/graph.js"></script>
<script src="js/overview.js"></script>

<style>
body{
  background:#000;
  color:white;
  font-family:Arial;
  margin:0;
}

h1{
  text-align:center;
  color:red;
}

h2{
  text-align:center;
}

/* ===================
   BOARDS
=================== */
#boards{
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap:10px;
  padding:10px;
}

.board{
  background:#111;
  border:2px solid red;
  padding:10px;
  border-radius:10px;
}

/* ===================
   GROUPS
=================== */
#groups{
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
  gap:10px;
  padding:10px;
}

.group{
  background:#111;
  padding:10px;
  border:1px solid #333;
  border-radius:6px;
}

/* ===================
   BRACKET
=================== */
#bracket{
  display:flex;
  justify-content:center;
  gap:40px;
  padding:20px;
}

.round{
  display:flex;
  flex-direction:column;
  justify-content:space-around;
}

.match{
  background:#111;
  padding:10px;
  border:1px solid #333;
  border-radius:6px;
  width:160px;
}

.winner{
  color:#00ff00;
  font-weight:bold;
}
</style>

</head>

<body>

<h1>🎯 Turnier Übersicht</h1>

<div id="boards"></div>

<h2>🧩 Gruppen</h2>
<div id="groups"></div>

<h2>🏆 Turnierbaum</h2>
<div id="bracket"></div>

</body>
</html>
