<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>📊 Stats & Leaderboard</title>

<script src="https://alcdn.msauth.net/browser/2.37.0/js/msal-browser.min.js"></script>
  <script src="js/auth.js"></script>
    <script src="js/graph.js"></script>  
  <script src="js/stats.js"></script>

<style>
body{
  background: radial-gradient(circle at top, #111, #000);
  color:white;
  font-family:Arial;
  text-align:center;
  margin:0;
}

h1{
  color:#ff0033;
  margin-top:20px;
}

/* Dropdown */
select{
  font-size:20px;
  padding:10px;
  margin:20px;
}

/* Stats Box */
.stats{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:20px;
}

.stat{
  background:#111;
  padding:20px;
  border-radius:10px;
  font-size:24px;
  width:200px;
  box-shadow:0px 0px 10px rgba(255,0,50,0.3);
}

/* Leaderboard */
table{
  width:90%;
  margin:40px auto;
  border-collapse:collapse;
  font-size:20px;
}

th, td{
  padding:12px;
  border-bottom:1px solid #333;
}

thead{
  background:#222;
}

tr:hover{
  background:#111;
}

.rank1{ color:gold; }
.rank2{ color:silver; }
.rank3{ color:#cd7f32; }

.sortBtn{
  margin:10px;
  padding:10px 20px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.activeSort{
  background:#ff0033;
}
</style>

</head>

<body>

<h1>📊 Spieler Statistik</h1>

<select id="playerSelect"></select>

<div id="playerStats" class="stats"></div>

<h1>🏆 Leaderboard</h1>

<button class="sortBtn activeSort" onclick="setSort('winrate')">Winrate</button>
<button class="sortBtn" onclick="setSort('avg')">Avg</button>

<table>
  <thead>
    <tr>
      <th>#</th>
      <th>Name</th>
      <th>Spiele</th>
      <th>Siege</th>
      <th>Average</th>
      <th>Checkout %</th>
      <th>Winrate %</th>
    </tr>
  </thead>
  <tbody id="leaderboard"></tbody>
</table>

</body>
</html>
