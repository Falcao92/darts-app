<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Spieler Statistik</title>

<!-- ✅ WICHTIG: MSAL MUSS ZUERST GELADEN WERDEN -->
<script src="https://alcdn.msauth.net/browser/2.37.0/js/msal-browser.min.js"></script>

<!-- ✅ DEINE SCRIPTS -->
<script src="js/auth.js"></script>
<script src="js/graph.js"></script>
<script src="js/stats.js"></script>

<style>
body{
  background: radial-gradient(circle at top, #111 0%, #000 80%);
  color:white;
  font-family:Arial, sans-serif;
  text-align:center;
  margin:0;
}

h1{
  color:#ff0033;
  margin-top:20px;
  font-size:36px;
}

/* Dropdown */
select{
  font-size:22px;
  padding:10px;
  margin:20px;
  border-radius:8px;
  border:none;
}

/* Stats Box */
.stats{
  margin-top:30px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:15px;
}

/* Einzelne Stat */
.stat{
  background:#111;
  padding:15px 30px;
  border-radius:10px;
  font-size:26px;
  width:300px;
  box-shadow:0 0 10px rgba(255,0,50,0.3);
}

/* Highlight */
.highlight{
  color:#00ffcc;
  font-weight:bold;
}

/* Hover Effekt */
.stat:hover{
  transform:scale(1.05);
  transition:0.2s;
}
</style>

</head>

<body>

<h1>📊 Spieler Statistik</h1>

<select id="playerSelect"></select>

<div class="stats" id="stats">
  <!-- Stats werden hier angezeigt -->
</div>

</body>
</html>
