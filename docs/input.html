<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"><html>
<title>Darts Input</title>

<!-- ✅ SCRIPTS -->
<script src="https://alcdn.msauth.net/browser/2.37.0/js/msal-browser.min.js"></script>
<script src="js/auth.js"></script>
<script src="js/graph.js"></script>
<script src="js/input.js"></script>

<style>
body{
  background:#000;
  color:white;
  font-family:Arial;
  text-align:center;
  margin:0;
  padding:10px;
}

h1{
  font-size:32px;
  color:#ff0033;
  margin:10px 0;
}

#score{
  font-size:60px;
  font-weight:bold;
  margin:20px 0;
}

#players{
  font-size:24px;
  margin-top:10px;
}

.activePlayer{
  background:#ff0033;
  padding:5px 10px;
  border-radius:6px;
}

.inactivePlayer{
  opacity:0.6;
}

#liveAvg{
  font-size:18px;
  color:#ccc;
}

input{
  font-size:22px;
  width:80px;
  text-align:center;
  margin:5px;
}

select{
  font-size:16px;
  padding:5px;
  margin:5px;
}

#buttons{
  display:grid;
  grid-template-columns: repeat(8, 1fr);
  gap:10px;
  padding:10px;
  margin-top:20px;
}

#buttons button{
  font-size:20px;
  padding:15px;
  border:none;
  border-radius:8px;
  background:#222;
  color:white;
  cursor:pointer;
}

#buttons button:hover{
  background:#ff0033;
}

#saveBtn{
  margin-top:20px;
  font-size:26px;
  padding:20px;
  width:80%;
  background:#00aa00;
  color:white;
  border:none;
  border-radius:10px;
}

.controls{
  margin-top:20px;
}

.controls button{
  font-size:18px;
  padding:15px;
  margin:5px;
  border:none;
  border-radius:8px;
}

.reset{ background:#444; }
.p1{ background:#0066ff; }
.p2{ background:#cc6600; }

@media (max-width: 900px){
  #buttons{
    grid-template-columns: repeat(5, 1fr);
  }

  #score{
    font-size:48px;
  }

  #buttons button{
    font-size:18px;
    padding:12px;
  }
}
</style>

</head>

<body>

<h1>🎯 Eingabe</h1>

<select id="modeSelect">
  <option value="tournament">Turnier</option>
  <option value="training">Training</option>
</select>

<br>

<select id="boardSelect"></select>

<!-- ✅ FIXED PLAYER BLOCK -->
<div id="players">
  <span id="p1"></span>
  <span> vs </span>
  <span id="p2"></span>
</div>

<h1 id="score"></h1>
<div id="legs"></div>
<div id="turn"></div>
<div id="liveAvg"></div>

<br>

<input id="d1" autocomplete="off">
<input id="d2" autocomplete="off">
<input id="d3" autocomplete="off">

<h3>Darts</h3>

<div id="buttons"></div>

<button id="saveBtn" onclick="submit()">💾 SPEICHERN</button>

<div class="controls">
  <button class="reset" onclick="resetMatch()">🔄 Reset</button>
  <button class="p1" onclick="endMatchWithWinner('p1')">🏆 P1</button>
  <button class="p2" onclick="endMatchWithWinner('p2')">🏆 P2</button>
</div>

</body>
</html>
