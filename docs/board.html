<!DOCTYPE html>
<html>
<head>

  <title>Darts Board</title>

  <!-- ✅ MSAL -->
  <script src="https://alcdn.msauth.net/browser/2.37.0/js/msal-browser.min.js"></script>

  <!-- ✅ KORREKTE SCRIPT TAGS -->
  <script src="js/auth.js"></script>
  <script src="js/graph.js"></script>
  <script src="js/board.js"></script>

  <style>
    body {
      margin: 0;
      background: #000;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    #boardLabel {
      position: absolute;
      top: 10px;
      left: 20px;
      color: #aaa;
    }

    .players {
      display: flex;
      justify-content: space-around;
      margin-top: 60px;
      font-size: 40px;
    }

    .active {
      color: yellow;
    }

    .score {
      font-size: 120px;
      margin: 40px 0;
      color: red;
    }

    .checkout {
      font-size: 40px;
      color: #00ff88;
    }

  </style>

</head>

<body>

  <!-- ✅ DIESE ELEMENTE SIND PFLICHT -->

  <div id="boardLabel"></div>

  <div class="players">
    <div id="p1">P1</div>
    <div id="p2">P2</div>
  </div>

  <div class="score" id="score">0 : 0</div>

  <div class="checkout" id="checkout"></div>

</body>
</html>
