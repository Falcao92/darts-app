<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Darts Board</title>

<script src="https://alcdn.msauth.net/browser/2.37.0/js/msal-browser.min.js"></script>
<script src="js/auth.js"></script>
<script src="js/graph.js"></script>
<script src="js/board.js"></script>

<style>
body{
  background:#000;
  color:white;
  font-family:Arial;
  text-align:center;
}

/* Spieler */
.players{
  display:flex;
  justify-content:space-between;
  padding:20px;
  font-size:28px;
}

.active{
  color:yellow;
}

/* Score */
.score{
  font-size:120px;
  color:red;
}

/* Legs */
.legs{
  margin-top:10px;
  font-size:28px;
  color:#00ccff;
}

/* Checkout */
.checkout{
  margin-top:10px;
  font-size:24px;
  color:yellow;
}
</style>

</head>

<body>

<!-- Board -->
<div id="boardLabel"></div>

<div class="players">
  <div id="p1">P1</div>
  <div id="p2">P2</div>
</div>

<div class="score" id="score">501 : 501</div>

<div class="legs" id="legs">0 : 0</div>

<div class="checkout" id="checkout"></div>

</body>
</html>
