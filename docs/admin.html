<!DOCTYPE html>
<html>
<head>

  <meta charset="UTF-8">
  <title>Darts Admin</title>

  <!-- MSAL + Scripts -->
  <script src="https://alcdn.msauth.net/browser/2.37.0/js/msal-browser.min.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/graph.js"></script>
  <script src="js/admin.js"></script>

  <style>
    body{
      background:#000;
      color:white;
      font-family:Arial;
      text-align:center;
    }

    h1{
      margin-top:20px;
    }

    h2{
      color:red;
      margin-bottom:10px;
    }

    .container{
      margin:20px auto;
      padding:15px;
      border:1px solid #333;
      border-radius:10px;
      width:80%;
    }

    input, select{
      padding:8px;
      margin:5px;
      font-size:16px;
    }

    button{
      padding:8px 12px;
      margin:5px;
      background:red;
      color:white;
      border:none;
      border-radius:5px;
      cursor:pointer;
    }

    button:hover{
      background:#ff4444;
    }

    .player{
      margin:5px;
    }

    #activeMatches{
      margin-top:15px;
    }

    #groupsView{
      margin-top:15px;
      text-align:left;
      display:inline-block;
    }

  </style>

</head>

<body>

<h1>⚙️ Admin</h1>

<!-- ========================= -->
<!-- 👤 SPIELER -->
<!-- ========================= -->
<div class="container">

  <h2>👤 Spieler</h2>

  <input id="name" placeholder="Name">
  <button onclick="createPlayer()">➕ Spieler</button>

  <div id="players"></div>

</div>


<!-- ========================= -->
<!-- 🎯 TRAININGSSPIELE -->
<!-- ========================= -->
<div class="container">

  <h2>🎯 Trainingsspiel</h2>

  <div>
    <select id="p1"></select>
    <select id="p2"></select>
    <select id="board"></select>
  </div>

  <button onclick="createTraining()">Match starten</button>

  <div id="activeMatches"></div>

</div>


<!-- ========================= -->
<!-- 🏆 TURNIER -->
<!-- ========================= -->
<div class="container">

  <h2>🏆 Turnier</h2>

  <div>
    <label>Boards verfügbar:</label>
    <input id="boardCount" type="number" value="4" min="1">
  </div>

  <div>
    <label>Gruppengröße:</label>
    <input id="groupSize" type="number" value="3" min="2">
  </div>

  <br>

  <button onclick="createGroups()">Gruppenphase starten</button>
  <button onclick="calculateGroups()">Tabelle anzeigen</button>
  <button onclick="startKO()">KO Phase starten</button>

  <div id="groupsView"></div>

</div>

</body>
</html>
