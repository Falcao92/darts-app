<!DOCTYPE html>
<html>
<head>

<script src="https://alcdn.msauth.net/browser/2.37.0/js/msal-browser.min.js"></script>
<script src="js/auth.js"></script>
<script src="js/graph.js"></script>
<script src="js/admin.js"></script>

<style>
body{
  background:#000;
  color:white;
  font-family:Arial;
  text-align:center;
}

h2{ color:red; }

.container{
  margin:20px;
  padding:15px;
  border:1px solid #333;
  border-radius:10px;
}

input, select{
  padding:8px;
  margin:5px;
}

button{
  padding:8px 12px;
  margin:5px;
  background:red;
  color:white;
  border:none;
  border-radius:5px;
}

.player{ margin:5px; }

</style>

</head>

<body>

<h1>⚙️ Admin</h1>

<div class="container">
<h2>👤 Spieler</h2>

<input id="name" placeholder="Name">
<button onclick="createPlayer()">➕ Spieler</button>

<div id="players"></div>
</div>


<div class="container">
<h2>🎯 Trainingsspiel</h2>

<select id="p1"></select>
<select id="p2"></select>
<select id="board"></select>

<button onclick="createTraining()">Match starten</button>

<div id="activeMatches"></div>
</div>


<div class="container">
<h2>🏆 Turnier</h2>

  <div>
    <label>Boards verfügbar:</label>
    <input id="boardCount" type="number" value="4" min="1">
  </div>

  <div>
    <label>Gruppengröße:</label>
    <input id="groupSize" type="number" value="3" min="2">
  </div>

  <button onclick="createGroups()">Gruppenphase starten</button>

  <div id="groupsView"></div>

<button onclick="createKO()">KO Turnier</button>
<button onclick="createGroups()">Gruppenphase</button>
</div>

</body>
</html>
