<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Darts Admin</title>

<script src="https://alcdn.msauth.net/browser/2.37.0/js/msal-browser.min.js"></script>
<script src="js/auth.js"></script>
<script src="js/graph.js"></script>
<script src="js/admin.js"></script>

<style>
body{
  background:#000; color:white; font-family:Arial; text-align:center;
}

.container{
  margin:20px auto;
  padding:15px;
  border:1px solid #333;
  border-radius:10px;
  width:90%;
  max-width:650px;
}

h2{ color:red; }

.playerRow{
  display:flex;
  justify-content:space-between;
  margin:5px;
}

</style>
</head>

<body>

<h1>⚙️ Admin</h1>

<!-- ========================= -->
<!-- 🟣 TRAININGSGRUPPE -->
<!-- ========================= -->
<div class="container">

  <h2>👥 Trainingsgruppe</h2>

  <input id="playerInput" placeholder="Name">

  <select id="playerType">
    <option value="training">Training</option>
    <option value="both">Training + Turnier</option>
  </select>

  <button onclick="addPlayer()">+ Spieler</button>

  <hr>

  <div id="trainingPlayers"></div>

</div>


<!-- ========================= -->
<!-- 🔵 TRAININGSSPIEL -->
<!-- ========================= -->
<div class="container">

  <h2>🎯 Trainingsspiel</h2>

  <select id="tp1"></select>
  <select id="tp2"></select>

  <input id="tboard" type="number" value="1">

  <br>

  <button onclick="createTrainingMatch()">▶ Start</button>   <br>
  <button onclick="endAllTrainingMatch()">
  🏁 Training beenden
</button>
</div>


<!-- ========================= -->
<!-- 🟡 TURNIER -->
<!-- ========================= -->
<div class="container">

  <h2>🏆 Turnier</h2>

  <div id="tournamentPlayers"></div>

  <hr>

  <input id="guestInput" placeholder="Gastspieler">
  <button onclick="addGuest()">+ Gast</button>

  <br><br>

  Boards:<br>
  <input id="boardCount" value="2">

  <br>

  Gruppengröße:<br>
  <input id="groupSize" value="2">

  <br><br>

  <label>
    <input type="checkbox" id="useGroups" checked>
    Gruppenphase
  </label>

  <br><br>

  <button onclick="startTournament()">🚀 Start</button>
    <br><br>
  <button onclick="endTournament()">
  🏁 Turnier beenden
</button>

</div>

</body>
</html>
