<!DOCTYPE html>
<html>
<head>

  <script src="https://alcdn.msauth.net/browser/2.37.0/js/msal-browser.min.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/graph.js"></script>
  <script src="js/admin.js"></script>

  <style>
    body{
      background:#000;
      color:white;
      font-family:Arial;
      text-align:center;
    }

    h2{
      color:red;
    }

    .container{
      margin:20px;
      padding:15px;
      border:1px solid #333;
      border-radius:10px;
    }

    input, select{
      padding:8px;
      margin:5px;
      font-size:16px;
    }

    button{
      padding:8px 12px;
      margin:5px;
      background:red;
      color:white;
      border:none;
      border-radius:5px;
      cursor:pointer;
    }

    button:hover{
      background:#ff4444;
    }

    .player{
      margin:5px;
    }

    #activeMatches{
      margin-top:15px;
      font-size:16px;
    }

  </style>

</head>

<body>

<h1>⚙️ Admin</h1>


<!-- ✅ SPIELER -->
<div class="container">
  <h2>👤 Spieler</h2>

  <input id="name" placeholder="Name">
  <button onclick="createPlayer()">➕ Spieler</button>

  <div id="players"></div>
</div>


<!-- ✅ TRAINING -->
<div class="container">
  <h2>🎯 Trainingsspiel</h2>

  <div>
    <select id="p1"></select>
    <select id="p2"></select>
    <select id="board"></select> <!-- ✅ WICHTIG -->
  </div>

  <button onclick="createTraining()">Match starten</button>

  <!-- ✅ AKTIVE MATCHES -->
  <div id="activeMatches"></div>
</div>


<!-- ✅ TURNIER -->
<div class="container">
  <h2>🏆 Turnier</h2>

  <button onclick="createKO()">KO Turnier</button>
  <button onclick="createGroups()">Gruppenphase</button>
</div>


</body>
</html>
