<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Darts Admin</title>

<!-- ✅ MSAL -->
<script src="https://alcdn.msauth.net/browser/2.37.0/js/msal-browser.min.js"></script>

<!-- ✅ DEINE JS FILES -->
<script src="js/auth.js"></script>
<script src="js/graph.js"></script>
<script src="js/admin.js"></script>

<style>
body{
  background:#000;
  color:white;
  font-family:Arial;
  text-align:center;
}
</style>

</head>
<style>
body{
  background:#000;
  color:white;
  font-family:Arial;
  text-align:center;
}

h1{
  margin-top:20px;
}

h2{
  color:red;
  margin-bottom:10px;
}

.container{
  margin:20px auto;
  padding:15px;
  border:1px solid #333;
  border-radius:10px;
  width:80%;
  max-width:600px;
}

input, select{
  padding:8px;
  margin:5px;
  font-size:16px;
}

button{
  padding:8px 12px;
  margin:5px;
  background:red;
  color:white;
  border:none;
  border-radius:5px;
  cursor:pointer;
}

button:hover{
  background:#ff4444;
}

.player{
  margin:5px;
}

#groupsView{
  margin-top:15px;
  text-align:left;
  display:inline-block;
}
</style>

</head>

<body>

<h1>⚙️ Admin</h1>

<!-- ========================= -->
<!-- 👤 SPIELER -->
<!-- ========================= -->
<div class="container">

  <h2>👤 Spieler</h2>
<div id="playerList"></div>
  <input id="name" placeholder="Name">
  <button onclick="createPlayer()">➕ Spieler</button>

  <div id="players"></div>

</div>


<!-- ========================= -->
<!-- 🎯 TRAINING -->
<!-- ========================= -->
<div class="container">

  <h2>🎯 Trainingsbetrieb</h2>

  <select id="tp1"></select>
  <select id="tp2"></select>
  <input type="number" id="tboard" value="1" min="1">

  <br>

  <button onclick="createTrainingMatch()">▶ Trainingsspiel starten</button>

</div>


<!-- ========================= -->
<!-- 🏆 TURNIER -->
<!-- ========================= -->
<div class="container">

  <h2>🏆 Turnier</h2>

  <div>
    <label>Boards:</label><br>
    <input id="boardCount" type="number" value="2" min="1">
  </div>

  <div>
    <label>Gruppengröße:</label><br>
    <input id="groupSize" type="number" value="2" min="2">
  </div>

  <br>

  <!-- ✅ NEU -->
  <label>
    <input type="checkbox" id="useGroups" checked>
    Mit Gruppenphase spielen
  </label>

  <br><br>

  <!-- ✅ EIN BUTTON -->
  <button onclick="startTournament()">🚀 Turnier starten</button>

  <div id="groupsView"></div>

</div>

</body>
</html>
